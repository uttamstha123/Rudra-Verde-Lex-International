<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Rudra Verde Lex International is a law firm providing strategic legal counsel, dispute resolution, and advisory services across diverse practice areas." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.rudraverdelex.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
    <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
    <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon/favicon-16x16.png" />
    <link rel="icon" href="./favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./favicon/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="Rudra Verde Lex International" />
    <meta property="og:description" content="Strategic legal counsel, dispute resolution, and advisory services." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.rudraverdelex.com/" />
    <meta property="og:site_name" content="Rudra Verde Lex International" />
    <meta property="og:image" content="https://www.rudraverdelex.com/favicon/android-chrome-512x512.png" />
    <meta property="og:image:alt" content="Rudra Verde Lex International logo" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rudra Verde Lex International" />
    <meta name="twitter:description" content="Strategic legal counsel, dispute resolution, and advisory services." />
    <meta name="twitter:image" content="https://www.rudraverdelex.com/favicon/android-chrome-512x512.png" />
    <title>Rudra Verde Lex International</title>
    <!--
        These two scripts have been added for the Visual Edits, please do not edit or remove them
        -->
    <script>
        // Only load visual edit scripts when inside an iframe
        if (window.self !== window.top) {
            // Load debug monitor script
            var debugMonitorScript = document.createElement('script');


            // Configure Tailwind
            window.tailwind = window.tailwind || {};
            tailwind.config = {
                corePlugins: { preflight: false },
            };

            // Load Tailwind CDN
            var tailwindScript = document.createElement('script');
            tailwindScript.src = 'https://cdn.tailwindcss.com';
            document.head.appendChild(tailwindScript);
        }
    </script>

        <script type="application/ld+json">
                {
                    "@context": "https://schema.org",
                    "@type": "Organization",
                    "name": "Rudra Verde Lex International",
                      "url": "https://www.rudraverdelex.com/",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://www.rudraverdelex.com/favicon/android-chrome-512x512.png",
                        "width": 512,
                        "height": 512
                    }
                }
        </script>
        <script type="application/ld+json">
                {
                    "@context": "https://schema.org",
                    "@type": "WebSite",
                      "url": "https://www.rudraverdelex.com/",
                    "name": "Rudra Verde Lex International"
                }
        </script>

</head>
